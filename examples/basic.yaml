overviews:
  casing:
    conduit_1: {wall: top, position: left}
    conduit_2: {wall: top, position: right}
  modules:
    - tipo_l
    - closed
    - tipo_l

components:
  conduit_1:
    type: conduit
    x: 60
    y: 50
  conduit_2:
    type: conduit
    x: 780
    y: 50
  plug_top:
    type: tipo_l
    x: 455
    y: 160
  plug_bottom:
    type: tipo_l
    x: 455
    y: 270
  bornera:
    type: 2x3
    x: 210
    y: 200

wires:
  - color: white
    from: conduit_1.bottom
    to: bornera.a1
  - color: brown
    from: bornera.a2
    to: conduit_2.bottom
  - color: brown
    from: bornera.a3
    to: plug_top.neutral.t

  - color: white
    from: conduit_1.bottom
    to: bornera.b1
  - color: brown
    from: bornera.b2
    to: conduit_2
  - color: brown
    from: bornera.b3
    to: plug_top.live.t

  - color: green
    from: conduit_1.bottom
    to: plug_bottom.ground.b
  - color: green
    from: plug_top.ground.t
    to: conduit_2.bottom

  # plug_bottom — wired port-by-port from plug_top (exits top, enters bottom)
  - color: brown
    from: plug_top.neutral.b
    to: plug_bottom.neutral.t
  - color: brown
    from: plug_top.live.b
    to: plug_bottom.live.t
  - color: green
    from: plug_top.ground.b
    to: plug_bottom.ground.t
