schema: wiring

title: COC.W.135

notes:
  - "- Toma de detrás de la cocina"
  - "- Hay 2 pares de cables a cada pin del schuko, el blanco de 2mm y el rojo de 1mm"
  - "- No se si los dos pares energizan el schuko o un par son de salida y vuelven por el mismo ducto."
  - "- Este circuito también conecta la bomba del pozo así que puede ser que los rojos vayan a la bomba aunque no está chequeado"
  - "- El diagrama de casing en realidad debería estar el schuko centrado en la plaqueta"

overviews:
  casing:
    type: 3x4
    conduit_1: {wall: left, position: bottom}
  cover:
    type: modules
    modules:
      - tipo_f
      - closed

components:
  conduit_1:
    type: conduit
    x: 60
    y: 300
  plug:
    type: tipo_f
    x: 220
    y: 160

wires:
  - color: red
    from: conduit_1.top
    to: plug.left.top
  - color: white
    from: conduit_1.right
    to: plug.left.bottom
  - color: green
    from: conduit_1.right
    to: plug.gnd.bottom
  - color: red
    from: conduit_1.top
    to: plug.right.top
  - color: white
    from: conduit_1.right
    to: plug.right.bottom
