schema: wiring

title: COC.W.270

notes:
  - "- Enchufe del lavavajillas"
  - "- Sospecho que cond-1 va hacia la bomba. Los cables blancos que van por cond-3 llegan hasta el enchufe del horno y ahí empalman con los rojos"
  - "- Luego los rojos vuelven por el mismo cond-3 y se van por cond-1 hacia afuera donde está la bomba"
  - "- Sería más fácil conectar los rojos directo al schuko del lavavajillas."

overviews:
  casing:
    type: 3x4
    conduit_1: {wall: left, position: center}
    conduit_2: {wall: left, position: bottom}
    conduit_3: {wall: right, position: top}
  cover:
    type: modules
    modules:
      - closed
      - tipo_f

