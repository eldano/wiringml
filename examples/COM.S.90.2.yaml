notes:
  - Switch 1 enciende luces de techo del comedor
  - Switch 2 controla luces de la barra
  - ⚠️ Esta boca es controlada por 2 térmicas distintas
  - Las tomas del comedor y las luces de la barra están en el mismo circuito
  - Las luces del techo del comedor están en circuito independiente.
  - Sería mejor que las luces de la barra y del comedor estén en 1 circuito y los tomas del comedor en otro
  - cond.1 va a las luces de la barra
  - cond.2 va a las luces del techo del comedor que están una después de la otra.
  - cond.3 parece ser el que viene del circuito principal.
  - cond.4 parece ser la continuación del circuito y dirigirse a los tomas de la pared comedor W
  - ⚠️ Switch_2 parece estar cortando el neutro y no la fase

